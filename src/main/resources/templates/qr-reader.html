<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combined Military Hospital Dhaka - QR Reader</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://unpkg.com/@zxing/library@0.20.0"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .bg-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .upload-area:hover {
            border-color: #667eea;
            background: #f9f9ff;
        }
        
        .preview-image {
            max-width: 100%;
            max-height: 300px;
            margin-top: 20px;
            border-radius: 10px;
            display: none;
        }
        
        #webcam-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
        }
        
        #webcam-video {
            width: 100%;
            display: block;
        }
        
        .result-box {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        
        .result-box.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        
        .result-box.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        
        .history-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        
        .history-item:last-child {
            border-bottom: none;
        }
        
        .history-content {
            word-break: break-all;
        }
        
        .history-format {
            font-size: 0.8rem;
            color: #667eea;
            background: #f0f4ff;
            padding: 2px 8px;
            border-radius: 4px;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .scanning {
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center text-white mb-4"><i class="bi bi-hospital me-2"></i>Combined Military Hospital Dhaka</h1>
        <p class="text-center text-white-50 mb-4">QR Code Reader</p>

        <div class="bg-card">
            <!-- Tabs -->
            <ul class="nav nav-pills mb-4" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#upload-tab" type="button">
                        📁 Upload Image
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" data-bs-toggle="pill" data-bs-target="#webcam-tab" type="button">
                        📷 Webcam Scanner
                    </button>
                </li>
            </ul>

            <!-- Result Display -->
            <div id="scan-result" class="result-box"></div>

            <!-- Upload Tab -->
            <div class="tab-pane fade show active" id="upload-tab">
                <!-- Type Selector -->
                <div class="btn-group mb-4" role="group">
                    <input type="radio" class="btn-check" name="scanType" id="type-qr" value="qr" checked>
                    <label class="btn btn-outline-primary" for="type-qr">QR Code</label>
                    
                    <input type="radio" class="btn-check" name="scanType" id="type-barcode" value="barcode">
                    <label class="btn btn-outline-primary" for="type-barcode">Barcode</label>
                    
                    <input type="radio" class="btn-check" name="scanType" id="type-auto" value="auto">
                    <label class="btn btn-outline-primary" for="type-auto">Auto Detect</label>
                </div>
                
                <!-- Upload Area -->
                <div class="upload-area" onclick="document.getElementById('file-input').click()">
                    <div class="mb-3" style="font-size: 3rem;">📁</div>
                    <p class="text-muted mb-0">Click to upload QR code or barcode image</p>
                    <input type="file" id="file-input" accept="image/*" onchange="handleFileSelect(event)" hidden>
                </div>
                <img id="preview-image" class="preview-image mx-auto d-block" alt="Preview">
                
                <div class="text-center mt-3">
                    <button class="btn btn-primary btn-lg" id="read-btn" onclick="readCodeFromFile()" disabled>
                        Read Code
                    </button>
                </div>
                
                <div class="mt-3 p-3 bg-light rounded">
                    <small class="text-muted">
                        <strong>Supported Barcodes:</strong> Code 128, Code 39, Code 93, Codabar, EAN-13, EAN-8, ITF, UPC-A, UPC-E
                    </small>
                </div>
            </div>

            <!-- Webcam Tab -->
            <div class="tab-pane fade" id="webcam-tab">
                <!-- Type Selector -->
                <div class="btn-group mb-4" role="group">
                    <input type="radio" class="btn-check" name="webcamScanType" id="webcam-type-qr" value="qr" checked>
                    <label class="btn btn-outline-primary" for="webcam-type-qr">QR Code</label>
                    
                    <input type="radio" class="btn-check" name="webcamScanType" id="webcam-type-barcode" value="barcode">
                    <label class="btn btn-outline-primary" for="webcam-type-barcode">Barcode</label>
                    
                    <input type="radio" class="btn-check" name="webcamScanType" id="webcam-type-auto" value="auto">
                    <label class="btn btn-outline-primary" for="webcam-type-auto">Auto Detect</label>
                </div>
                
                <div id="webcam-container">
                    <video id="webcam-video" autoplay playsinline></video>
                </div>
                
                <div class="text-center mt-3">
                    <button class="btn btn-primary" id="start-webcam" onclick="startWebcam()">
                        ▶️ Start Webcam
                    </button>
                    <button class="btn btn-danger" id="stop-webcam" onclick="stopWebcam()" style="display: none;">
                        ⏹️ Stop Webcam
                    </button>
                </div>
            </div>
        </div>

        <!-- History Card -->
        <div class="bg-card">
            <h5 class="border-bottom pb-2 mb-3">📋 Recent Scans</h5>
            <div id="history-container">
                <p class="text-muted text-center">Loading history...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let selectedFile = null;
        let codeReader = null;
        let webcamStream = null;
        let scanInterval = null;
        let scanHistory = [];

        // Get selected scan type
        function getSelectedScanType() {
            const selected = document.querySelector('input[name="scanType"]:checked');
            return selected ? selected.value : 'auto';
        }

        // Get selected webcam scan type
        function getSelectedWebcamScanType() {
            const selected = document.querySelector('input[name="webcamScanType"]:checked');
            return selected ? selected.value : 'auto';
        }

        // Initialize ZXing code reader
        async function initCodeReader() {
            try {
                codeReader = new ZXing.BrowserMultiFormatReader();
                console.log('ZXing reader initialized');
            } catch (err) {
                console.error('Error initializing ZXing:', err);
            }
        }

        initCodeReader();

        function handleFileSelect(event) {
            selectedFile = event.target.files[0];
            if (selectedFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('preview-image');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    document.getElementById('read-btn').disabled = false;
                };
                reader.readAsDataURL(selectedFile);
            }
        }

        function getFormatsForType(type) {
            const formats = {
                'qr': [ZXing.BarcodeFormat.QR_CODE],
                'barcode': [
                    ZXing.BarcodeFormat.CODE_128,
                    ZXing.BarcodeFormat.CODE_39,
                    ZXing.BarcodeFormat.CODE_93,
                    ZXing.BarcodeFormat.CODABAR,
                    ZXing.BarcodeFormat.EAN_13,
                    ZXing.BarcodeFormat.EAN_8,
                    ZXing.BarcodeFormat.ITF,
                    ZXing.BarcodeFormat.UPC_A,
                    ZXing.BarcodeFormat.UPC_E
                ],
                'auto': [
                    ZXing.BarcodeFormat.QR_CODE,
                    ZXing.BarcodeFormat.CODE_128,
                    ZXing.BarcodeFormat.CODE_39,
                    ZXing.BarcodeFormat.CODE_93,
                    ZXing.BarcodeFormat.CODABAR,
                    ZXing.BarcodeFormat.EAN_13,
                    ZXing.BarcodeFormat.EAN_8,
                    ZXing.BarcodeFormat.ITF,
                    ZXing.BarcodeFormat.UPC_A,
                    ZXing.BarcodeFormat.UPC_E
                ]
            };
            return formats[type] || formats['auto'];
        }

        async function readCodeFromFile() {
            if (!selectedFile) return;

            const scanType = getSelectedScanType();
            const resultDiv = document.getElementById('scan-result');
            resultDiv.style.display = 'block';
            resultDiv.className = 'result-box';
            resultDiv.innerHTML = '<div class="spinner-border text-primary" role="status"></div>';

            // First try with ZXing client-side
            if (codeReader) {
                try {
                    const img = document.getElementById('preview-image');
                    const hints = new Map();
                    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, getFormatsForType(scanType));
                    
                    const result = await codeReader.decodeFromImage(img, hints);
                    if (result) {
                        showResult(true, result.getText(), result.getBarcodeFormat().name);
                        saveToHistory(result.getText(), result.getBarcodeFormat().name);
                        return;
                    }
                } catch (err) {
                    console.log('Client-side reading failed, trying server:', err.message);
                }
            }

            // Fallback to server-side reading
            const formData = new FormData();
            formData.append('file', selectedFile);
            
            let endpoint = '/api/qr/read';
            if (scanType === 'barcode') {
                endpoint = '/api/qr/read-barcode';
            } else if (scanType === 'auto') {
                endpoint = '/api/qr/read-any';
            }

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showResult(true, data.content, data.format);
                    saveToHistory(data.content, data.format);
                } else {
                    showResult(false, data.message);
                }
            } catch (error) {
                showResult(false, 'Error reading code: ' + error.message);
            }
        }

        function showResult(success, content, format = null) {
            const resultDiv = document.getElementById('scan-result');
            resultDiv.style.display = 'block';
            
            if (success) {
                resultDiv.className = 'result-box success';
                resultDiv.innerHTML = `
                    <h5 class="mb-2">✅ Code Read Successfully!</h5>
                    <p class="mb-1"><strong>Content:</strong> ${content}</p>
                    ${format ? `<span class="badge bg-primary">${format}</span>` : ''}
                `;
            } else {
                resultDiv.className = 'result-box error';
                resultDiv.innerHTML = `
                    <h5 class="mb-2">❌ Error</h5>
                    <p class="mb-0">${content}</p>
                `;
            }
        }

        // Webcam functions
        async function startWebcam() {
            try {
                const video = document.getElementById('webcam-video');
                webcamStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                video.srcObject = webcamStream;
                
                document.getElementById('start-webcam').style.display = 'none';
                document.getElementById('stop-webcam').style.display = 'inline-block';
                
                // Start scanning
                startContinuousScan();
            } catch (err) {
                alert('Error accessing webcam: ' + err.message);
            }
        }

        function stopWebcam() {
            if (webcamStream) {
                webcamStream.getTracks().forEach(track => track.stop());
            }
            if (scanInterval) {
                clearInterval(scanInterval);
            }
            
            document.getElementById('webcam-video').srcObject = null;
            document.getElementById('start-webcam').style.display = 'inline-block';
            document.getElementById('stop-webcam').style.display = 'none';
        }

        async function startContinuousScan() {
            if (!codeReader) {
                codeReader = new ZXing.BrowserMultiFormatReader();
            }
            
            const video = document.getElementById('webcam-video');
            const scanType = getSelectedWebcamScanType();
            
            scanInterval = setInterval(async () => {
                try {
                    const hints = new Map();
                    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, getFormatsForType(scanType));
                    
                    const result = await codeReader.decodeFromVideoElement(video, hints);
                    if (result) {
                        console.log('Scanned:', result.getText());
                        showResult(true, result.getText(), result.getBarcodeFormat().name);
                        saveToHistory(result.getText(), result.getBarcodeFormat().name);
                        
                        // Pause scanning briefly
                        clearInterval(scanInterval);
                        setTimeout(() => startContinuousScan(), 2000);
                    }
                } catch (err) {
                    // Ignore scanning errors
                }
            }, 500);
        }

        // History functions
        function saveToHistory(content, format) {
            const entry = {
                content: content,
                format: format,
                timestamp: new Date().toLocaleString()
            };
            
            scanHistory.unshift(entry);
            if (scanHistory.length > 10) {
                scanHistory = scanHistory.slice(0, 10);
            }
            
            localStorage.setItem('scanHistory', JSON.stringify(scanHistory));
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('history-container');
            
            if (scanHistory.length === 0) {
                container.innerHTML = '<p class="text-muted text-center">No scan history yet</p>';
                return;
            }
            
            let html = '';
            scanHistory.forEach(entry => {
                html += `
                    <div class="history-item d-flex justify-content-between align-items-start">
                        <div class="history-content">${entry.content}</div>
                        <div>
                            <span class="history-format">${entry.format}</span>
                            <small class="text-muted d-block">${entry.timestamp}</small>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // Load history on page load
        function loadHistory() {
            const saved = localStorage.getItem('scanHistory');
            if (saved) {
                try {
                    scanHistory = JSON.parse(saved);
                    renderHistory();
                } catch (err) {
                    console.error('Error loading history:', err);
                }
            }
        }

        loadHistory();
    </script>
</body>
</html>
