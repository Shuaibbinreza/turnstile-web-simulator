<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code & Barcode Reader</title>
    <script src="https://unpkg.com/@zxing/library@0.20.0"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: #f0f0f0;
            color: #666;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .type-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .type-option {
            flex: 1;
            min-width: 120px;
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .type-option:hover {
            border-color: #667eea;
        }

        .type-option.selected {
            border-color: #667eea;
            background: #f0f4ff;
            color: #667eea;
            font-weight: bold;
        }

        .type-option input {
            display: none;
        }

        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: #f9f9ff;
        }

        .upload-area input {
            display: none;
        }

        .upload-icon {
            font-size: 4rem;
            color: #667eea;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #666;
            font-size: 1.1rem;
        }

        .preview-image {
            max-width: 100%;
            max-height: 300px;
            margin-top: 20px;
            border-radius: 10px;
            display: none;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        #webcam-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
        }

        #webcam-video {
            width: 100%;
            display: block;
        }

        #scan-result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        #scan-result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        #scan-result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .result-content {
            font-size: 1.2rem;
            font-weight: bold;
            word-break: break-all;
        }

        .result-format {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }

        .history-list {
            list-style: none;
        }

        .history-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-content {
            flex: 1;
            word-break: break-all;
            color: #333;
        }

        .history-format {
            font-size: 0.8rem;
            color: #667eea;
            background: #f0f4ff;
            padding: 2px 8px;
            border-radius: 4px;
            margin-left: 10px;
        }

        .history-time {
            color: #999;
            font-size: 0.85rem;
            margin-left: 15px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .supported-formats {
            margin-top: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #666;
        }

        .supported-formats strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>QR Code & Barcode Reader</h1>

        <div class="card">
            <div class="tab-container">
                <button class="tab-btn active" onclick="showTab('upload')">Upload Image</button>
                <button class="tab-btn" onclick="showTab('webcam')">Webcam Scanner</button>
            </div>

            <div id="scan-result"></div>

            <!-- Upload Tab -->
            <div id="upload-tab" class="tab-content active">
                <div class="type-selector">
                    <label class="type-option selected" id="type-qr">
                        <input type="radio" name="scanType" value="qr" checked>
                        QR Code
                    </label>
                    <label class="type-option" id="type-barcode">
                        <input type="radio" name="scanType" value="barcode">
                        Barcode
                    </label>
                    <label class="type-option" id="type-auto">
                        <input type="radio" name="scanType" value="auto">
                        Auto Detect
                    </label>
                </div>
                
                <div class="upload-area" onclick="document.getElementById('file-input').click()">
                    <div class="upload-icon">📁</div>
                    <div class="upload-text">Click to upload QR code or barcode image</div>
                    <input type="file" id="file-input" accept="image/*" onchange="handleFileSelect(event)">
                </div>
                <img id="preview-image" class="preview-image" alt="Preview">
                <div style="text-align: center;">
                    <button class="btn" id="read-btn" onclick="readCodeFromFile()" disabled>Read Code</button>
                </div>
                <div class="supported-formats">
                    <strong>Supported Barcode Formats:</strong> Code 128, Code 39, Code 93, Codabar, EAN-13, EAN-8, ITF, UPC-A, UPC-E
                </div>
            </div>

            <!-- Webcam Tab -->
            <div id="webcam-tab" class="tab-content">
                <div class="type-selector">
                    <label class="type-option selected" id="webcam-type-qr">
                        <input type="radio" name="webcamScanType" value="qr" checked>
                        QR Code
                    </label>
                    <label class="type-option" id="webcam-type-barcode">
                        <input type="radio" name="webcamScanType" value="barcode">
                        Barcode
                    </label>
                    <label class="type-option" id="webcam-type-auto">
                        <input type="radio" name="webcamScanType" value="auto">
                        Auto Detect
                    </label>
                </div>
                <div id="webcam-container">
                    <video id="webcam-video" autoplay playsinline></video>
                </div>
                <div style="text-align: center; margin-top: 15px;">
                    <button class="btn" id="start-webcam" onclick="startWebcam()">Start Webcam</button>
                    <button class="btn" id="stop-webcam" onclick="stopWebcam()" style="display: none;">Stop Webcam</button>
                </div>
            </div>

            <!-- History Card -->
            <div class="card">
                <h2>Recent Scans</h2>
            <div id="history-container">
                <div class="loading">Loading history...</div>
            </div>
        </div>
    </div>

    <script>
        let selectedFile = null;
        let codeReader = null;
        let webcamStream = null;
        let scanInterval = null;
        let scanHistory = [];

        // Type selector click handling
        document.querySelectorAll('.type-option').forEach(option => {
            option.addEventListener('click', function() {
                const parent = this.closest('.type-selector');
                parent.querySelectorAll('.type-option').forEach(opt => opt.classList.remove('selected'));
                this.classList.add('selected');
                this.querySelector('input').checked = true;
            });
        });

        // Get selected scan type
        function getSelectedScanType(prefix = '') {
            const name = prefix + 'scanType';
            const selected = document.querySelector(`input[name="${name}"]:checked`);
            return selected ? selected.value : 'auto';
        }

        // Initialize ZXing code reader
        async function initCodeReader() {
            try {
                codeReader = new ZXing.BrowserMultiFormatReader();
                console.log('ZXing reader initialized');
            } catch (err) {
                console.error('Error initializing ZXing:', err);
            }
        }

        initCodeReader();

        function showTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            if (tabName === 'upload') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('upload-tab').classList.add('active');
                stopWebcam();
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('webcam-tab').classList.add('active');
            }
        }

        function handleFileSelect(event) {
            selectedFile = event.target.files[0];
            if (selectedFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('preview-image');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    document.getElementById('read-btn').disabled = false;
                    document.getElementById('read-btn').textContent = 'Read ' + getScanTypeLabel(getSelectedScanType(''));
                };
                reader.readAsDataURL(selectedFile);
            }
        }

        function getScanTypeLabel(type) {
            switch(type) {
                case 'qr': return 'QR Code';
                case 'barcode': return 'Barcode';
                case 'auto': return 'Code';
                default: return 'Code';
            }
        }

        function getFormatsForType(type) {
            const formats = {
                'qr': [ZXing.BarcodeFormat.QR_CODE],
                'barcode': [
                    ZXing.BarcodeFormat.CODE_128,
                    ZXing.BarcodeFormat.CODE_39,
                    ZXing.BarcodeFormat.CODE_93,
                    ZXing.BarcodeFormat.CODABAR,
                    ZXing.BarcodeFormat.EAN_13,
                    ZXing.BarcodeFormat.EAN_8,
                    ZXing.BarcodeFormat.ITF,
                    ZXing.BarcodeFormat.UPC_A,
                    ZXing.BarcodeFormat.UPC_E
                ],
                'auto': [
                    ZXing.BarcodeFormat.QR_CODE,
                    ZXing.BarcodeFormat.CODE_128,
                    ZXing.BarcodeFormat.CODE_39,
                    ZXing.BarcodeFormat.CODE_93,
                    ZXing.BarcodeFormat.CODABAR,
                    ZXing.BarcodeFormat.EAN_13,
                    ZXing.BarcodeFormat.EAN_8,
                    ZXing.BarcodeFormat.ITF,
                    ZXing.BarcodeFormat.UPC_A,
                    ZXing.BarcodeFormat.UPC_E
                ]
            };
            return formats[type] || formats['auto'];
        }

        async function readCodeFromFile() {
            if (!selectedFile) return;

            const scanType = getSelectedScanType('');
            const resultDiv = document.getElementById('scan-result');
            resultDiv.style.display = 'block';
            resultDiv.className = '';
            resultDiv.innerHTML = `<div class="loading"><div class="spinner"></div><p>Reading ${getScanTypeLabel(scanType)}...</p></div>`;

            // First try with ZXing client-side
            if (codeReader) {
                try {
                    const img = document.getElementById('preview-image');
                    const hints = new Map();
                    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, getFormatsForType(scanType));
                    
                    const result = await codeReader.decodeFromImage(img, hints);
                    if (result) {
                        showResult(true, result.getText(), result.getBarcodeFormat().name);
                        saveToHistory(result.getText(), result.getBarcodeFormat().name);
                        return;
                    }
                } catch (err) {
                    console.log('Client-side reading failed, trying server:', err.message);
                }
            }

            // Fallback to server-side reading
            const formData = new FormData();
            formData.append('file', selectedFile);

            let endpoint = '/api/qr/read-any';
            if (scanType === 'qr') endpoint = '/api/qr/read';
            else if (scanType === 'barcode') endpoint = '/api/qr/read-barcode';

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (data.success) {
                    showResult(true, data.content, data.format);
                    saveToHistory(data.content, data.format);
                } else {
                    showResult(false, data.message);
                }
            } catch (error) {
                showResult(false, 'Error: ' + error.message);
            }
        }

        async function startWebcam() {
            try {
                webcamStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                
                const video = document.getElementById('webcam-video');
                video.srcObject = webcamStream;
                
                document.getElementById('start-webcam').style.display = 'none';
                document.getElementById('stop-webcam').style.display = 'inline-block';

                // Start continuous scanning
                scanWithWebcam();
            } catch (err) {
                alert('Error accessing webcam: ' + err.message);
            }
        }

        function stopWebcam() {
            if (webcamStream) {
                webcamStream.getTracks().forEach(track => track.stop());
                webcamStream = null;
            }
            
            if (scanInterval) {
                clearInterval(scanInterval);
                scanInterval = null;
            }

            document.getElementById('start-webcam').style.display = 'inline-block';
            document.getElementById('stop-webcam').style.display = 'none';
        }

        async function scanWithWebcam() {
            if (!codeReader || !webcamStream) return;

            const scanType = getSelectedScanType('webcam');
            const video = document.getElementById('webcam-video');
            
            scanInterval = setInterval(async () => {
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    try {
                        const hints = new Map();
                        hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, getFormatsForType(scanType));
                        
                        const result = await codeReader.decodeFromVideoElement(video, hints);
                        if (result) {
                            showResult(true, result.getText(), result.getBarcodeFormat().name);
                            saveToHistory(result.getText(), result.getBarcodeFormat().name);
                            stopWebcam();
                        }
                    } catch (err) {
                        // Silent fail for continuous scanning
                    }
                }
            }, 200);
        }

        function showResult(success, message, format = null) {
            const resultDiv = document.getElementById('scan-result');
            resultDiv.style.display = 'block';
            resultDiv.className = success ? 'success' : 'error';
            
            let html = '';
            if (success) {
                const formatLabel = format ? format.replace('_', ' ') : 'CODE';
                html = `<p>Found:</p><div class="result-content">${escapeHtml(message)}</div><div class="result-format">Format: ${formatLabel}</div>`;
            } else {
                html = `<p>${escapeHtml(message)}</p>`;
            }
            resultDiv.innerHTML = html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function saveToHistory(content, format) {
            scanHistory.unshift({
                content: content,
                format: format,
                time: new Date()
            });
            
            // Keep only last 10 items
            if (scanHistory.length > 10) {
                scanHistory = scanHistory.slice(0, 10);
            }
            
            loadHistory();
        }

        function loadHistory() {
            const container = document.getElementById('history-container');
            
            if (scanHistory.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #999;">Scan a code to see it here</p>';
                return;
            }
            
            let html = '<ul class="history-list">';
            scanHistory.forEach(item => {
                const formatLabel = item.format ? item.format.replace('_', ' ') : 'CODE';
                const timeStr = item.time.toLocaleTimeString();
                html += `<li class="history-item">
                    <span class="history-content">${escapeHtml(item.content)}</span>
                    <span class="history-format">${formatLabel}</span>
                    <span class="history-time">${timeStr}</span>
                </li>`;
            });
            html += '</ul>';
            
            container.innerHTML = html;
        }

        // Update button text when type changes
        document.querySelectorAll('input[name="scanType"]').forEach(input => {
            input.addEventListener('change', function() {
                if (selectedFile) {
                    document.getElementById('read-btn').textContent = 'Read ' + getScanTypeLabel(this.value);
                }
            });
        });

        // Load history on page load
        loadHistory();
    </script>
</body>
</html>
