<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combined Military Hospital Dhaka - QR Code Tool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3) !important;
        }
        
        .card-icon {
            font-size: 3rem;
        }
    </style>
</head>
<body>
    <div class="container text-center">
        <h1 class="text-white mb-2">Combined Military Hospital Dhaka</h1>
        <p class="text-white-50 mb-5">QR Code Tool</p>
        
        <div class="row justify-content-center g-4">
            <div class="col-md-4">
                <a href="/reader-page" class="text-decoration-none">
                    <div class="card p-5 h-100">
                        <div class="card-icon mb-3">📷</div>
                        <h4 class="text-dark">QR Reader</h4>
                        <p class="text-muted mb-0">Scan QR codes from images or webcam</p>
                    </div>
                </a>
            </div>
            
            <div class="col-md-4">
                <a href="/" class="text-decoration-none">
                    <div class="card p-5 h-100">
                        <div class="card-icon mb-3">🚪</div>
                        <h4 class="text-dark">Turnstile Gate</h4>
                        <p class="text-muted mb-0">Simulate turnstile gate access control</p>
                    </div>
                </a>
            </div>
            
            <div class="col-md-4">
                <a href="#" class="text-decoration-none" onclick="alert('QR Generator feature coming soon!'); return false;">
                    <div class="card p-5 h-100">
                        <div class="card-icon mb-3">✨</div>
                        <h4 class="text-dark">QR Generator</h4>
                        <p class="text-muted mb-0">Generate QR codes from text or URLs</p>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
