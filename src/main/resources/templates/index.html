<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator & Reader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            font-size: 3rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        p {
            color: rgba(255,255,255,0.9);
            font-size: 1.2rem;
            margin-bottom: 40px;
        }

        .cards {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            display: inline-block;
            min-width: 250px;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .card-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .card-title {
            color: #333;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .card-desc {
            color: #666;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>QR Code Tool</h1>
        <p>Generate and read QR codes easily</p>
        
        <div class="cards">
            <a href="/reader-page" class="card">
                <div class="card-icon">📷</div>
                <div class="card-title">QR Reader</div>
                <div class="card-desc">Scan QR codes from images or webcam</div>
            </a>
            
            <a href="/turnstile-page" class="card">
                <div class="card-icon">🚪</div>
                <div class="card-title">Turnstile Gate</div>
                <div class="card-desc">Simulate turnstile gate access control</div>
            </a>
            
            <a href="#" class="card" onclick="alert('QR Generator feature coming soon!'); return false;">
                <div class="card-icon">✨</div>
                <div class="card-title">QR Generator</div>
                <div class="card-desc">Generate QR codes from text or URLs</div>
            </a>
        </div>
    </div>
</body>
</html>
